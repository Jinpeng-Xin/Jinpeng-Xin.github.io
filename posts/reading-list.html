        /* ===== 书单时间线 ===== */
        .reading-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 20px 120px;
        }

        /* 顶部说明 */
        .reading-intro {
            max-width: 680px;
            margin: 0 auto 30px;
            text-align: center;
        }
        .reading-intro h2 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            margin: 0 0 18px;
        }
        .reading-intro p {
            font-size: 1.02rem;
            line-height: 1.85;
            color: #555;
            margin: 0;
        }

        .reading-meta {
            text-align: center;
            color: #b0b0b5;
            font-size: 0.88rem;
            margin: 0 0 45px;
        }

        /* 年份分组 */
        .year-group { margin-bottom: 10px; }

        .year-label {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            margin: 40px 0 20px;
            padding-left: 4px;
        }
        .year-label span {
            font-size: 0.9rem;
            font-weight: 500;
            color: #b0b0b5;
            margin-left: 10px;
        }

        /* 时间线主体 */
        .timeline {
            position: relative;
            padding-left: 26px;
            border-left: 2px solid rgba(0, 0, 0, 0.07);
        }

        .book {
            position: relative;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            padding: 13px 18px;
            margin-bottom: 8px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .book:hover {
            transform: translateX(4px);
            background: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        /* 时间线圆点 */
        .book::before {
            content: "";
            position: absolute;
            left: -35px;
            top: 20px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #fff;
            border: 2.5px solid #c5c5cc;
            transition: border-color 0.25s ease;
        }
        .book:hover::before { border-color: #007aff; }

        .book-main { flex: 1; min-width: 0; }

        /* 书名链接（→ 豆瓣搜索） */
        .book-title {
            font-size: 1.05rem;
            font-weight: 500;
            color: #1d1d1f;
            line-height: 1.45;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .book-title:hover { color: #007aff; }
        .book-title .ext {
            font-size: 0.75rem;
            color: #c0c0c8;
            margin-left: 6px;
            transition: color 0.2s ease;
        }
        .book-title:hover .ext { color: #007aff; }

        .book-sub {
            font-size: 0.8rem;
            color: #a0a0a8;
            margin-top: 2px;
        }

        .book-date {
            flex-shrink: 0;
            font-size: 0.85rem;
            color: #999;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .book { flex-direction: column; gap: 6px; }
            .book-date { align-self: flex-start; }
        }
    </style>
</head>

                <p>这是我本科在北京交通大学的图书馆借阅清单<br>
                从 2023 年秋天第一次借书，图书馆系统一直记到现在<br>

                既有力学分析、桥梁设计，也有鲁迅、余华、卡夫卡等<br>
                把它们按借阅时间排成一条线，回头再看，大概能看出每个阶段心里都在想些什么<br>
                曾有人对我说：“如果你想真正了解一个人，就去看看他书桌上摆着哪些书。”<br>
                这大概就是我的大学书桌…</p>

        /* 生成豆瓣搜索链接（标题去掉括注与版次，命中更准） */
        function doubanUrl(title) {
            const q = title.replace(/（[^）]*）/g, '').trim();
            return 'https://search.douban.com/book/subject_search?search_text=' + encodeURIComponent(q);
        }

        /* ── 按年份分组渲染 ── */
        function render() {
            const container = document.getElementById('reading-list');
            const groups = {};
            books.forEach(b => {
                const year = b.d.slice(0, 4);
                (groups[year] = groups[year] || []).push(b);
            });

            const years = Object.keys(groups).sort((a, b) => b - a);
            container.innerHTML = years.map(year => {
                const items = groups[year].map(b => {
                    const md = b.d.slice(5).replace('-', '.');
                    const sub = b.s ? `<div class="book-sub">${b.s}</div>` : '';
                    return `
                    <div class="book">
                        <div class="book-main">
                            <a class="book-title" href="${doubanUrl(b.t)}" target="_blank" rel="noopener">${b.t}</a>${sub}
                        </div>
                        <div class="book-date">${md}</div>
                    </div>`;
                }).join('');
                return `
                <div class="year-group" data-year="${year}">
                    <div class="year-label">${year}<span>${groups[year].length} 册</span></div>
                    <div class="timeline">${items}</div>
                </div>`;
            }).join('');
        }
        render();
